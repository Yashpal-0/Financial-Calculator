<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAGR Calculator | FinCalc Suite</title>
  <meta name="description"
    content="Compound Annual Growth Rate (CAGR) calculator to understand the smoothed annual return of an investment over time.">
  <meta name="theme-color" content="#0d9488">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../styles.css">
  <link rel="canonical" href="https://yashpal-0.github.io/Financial-Calculator/pages/cagr.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="CAGR Calculator | FinCalc Suite">
  <meta property="og:description"
    content="Calculate CAGR with interactive sliders and visual breakdown charts.">
  <meta property="og:url" content="https://yashpal-0.github.io/Financial-Calculator/pages/cagr.html">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta property="og:image" content="https://yashpal-0.github.io/Financial-Calculator/favicon.svg">

  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.dataset.theme = saved;
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 font-sans antialiased transition-colors duration-300">
  
  <div id="app"></div>

  <script type="module">
    import { initApp } from '../scripts/app.js';
    import { renderCAGRApp } from '../scripts/cagr.js';
    
    initApp();
    renderCAGRApp(document.getElementById('app'));
  </script>
</body>

</html>
