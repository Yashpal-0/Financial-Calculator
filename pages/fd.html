<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fixed Deposit (FD) Calculator | FinCalc Suite</title>
  <link rel="canonical" href="https://yashpal-0.github.io/Financial-Calculator/pages/fd.html">
    <meta name="description" content="Calculate maturity amount and interest earned on Fixed Deposits with monthly, quarterly, or yearly compounding.">
    <meta name="theme-color" content="#0d9488">
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <meta property="og:type" content="website">
  <meta property="og:title" content="Fixed Deposit (FD) Calculator | FinCalc Suite">
  <meta property="og:description" content="Calculate maturity amount and interest earned on Fixed Deposits with monthly, quarterly, or yearly compounding.">
  <meta property="og:url" content="https://yashpal-0.github.io/Financial-Calculator/pages/fd.html">
  <meta property="og:image" content="https://yashpal-0.github.io/Financial-Calculator/favicon.svg">

  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.dataset.theme = saved;
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 font-sans antialiased transition-colors duration-300">
    <div id="fd-app"></div>

    <script type="module">
        import { initApp } from '../scripts/app.js';
        import { renderFDApp } from '../scripts/fd.js';
        
        // Initialize theme and install buttons
        initApp();
        
        // Render Preact App
        renderFDApp(document.getElementById('fd-app'));
    </script>
</body>
</html>
