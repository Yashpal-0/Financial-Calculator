<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loan Balance Transfer Calculator | FinCalc Suite</title>
  <meta name="description" content="Compare your current loan with a new lender offer to calculate total interest savings and break-even period.">
  <meta name="theme-color" content="#0d9488">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../styles.css">
  <link rel="canonical" href="https://yashpal-0.github.io/Financial-Calculator/pages/balance-transfer.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Loan Balance Transfer Calculator | FinCalc Suite">
  <meta property="og:description" content="Compare your current loan with a new lender offer to calculate total interest savings and break-even period.">
  <meta property="og:url" content="https://yashpal-0.github.io/Financial-Calculator/pages/balance-transfer.html">
  <meta property="og:image" content="https://yashpal-0.github.io/Financial-Calculator/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.dataset.theme = saved;
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 font-sans antialiased transition-colors duration-300">
  <div id="balance-transfer-app"></div>

  <script type="module">
    import { initApp } from '../scripts/app.js';
    import { renderBalanceTransferApp } from '../scripts/balance-transfer.js';
    
    // Initialize theme and PWA features
    initApp();
    
    // Render the Preact app
    const container = document.getElementById('balance-transfer-app');
    renderBalanceTransferApp(container);
  </script>
</body>
</html>
